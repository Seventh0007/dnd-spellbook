<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Stat Block - 火球术</title>
<link rel="stylesheet" href="css/stat-block.css">
</head>
<body>

<div class="stat-block">
    <div class="spell-name">火球术</div>
    <div class="spell-subtitle">Fireball · <span class="num">3</span>环 塑能</div>
    <hr class="divider">

    <div class="stat-line">
        <span class="stat-label">施法时间</span>
        <span class="stat-value">动作</span>
    </div>
    <div class="stat-line">
        <span class="stat-label">施法距离</span>
        <span class="stat-value"><span class="num">150</span>尺</span>
    </div>
    <div class="stat-line">
        <span class="stat-label">法术成分</span>
        <span class="stat-value">V、S、M（一颗蝙蝠粪和硫磺搓成的小球）</span>
    </div>
    <div class="stat-line">
        <span class="stat-label">持续时间</span>
        <span class="stat-value">立即</span>
    </div>

    <hr class="divider">

    <div class="description">
        明亮的闪光从你的指间飞驰向施法距离内你指定的一点，并随着一声低吼迸成一片烈焰。<strong>目标点周围半径<span class="num">20</span>尺球状区域内的每个生物必须进行一次敏捷豁免。豁免失败者将受到<span class="num">8</span>d<span class="num">6</span>点火焰伤害，豁免成功则伤害减半。
区域内所有未被着装或携带的可燃物件会开始燃烧。</strong>
    </div>

    <div class="higher-level">
        <span class="higher-level-label">升环施法。</span>使用的法术位每比<span class="num">3</span>环高一环，此伤害就增加<span class="num">1</span>d<span class="num">6</span>。
    </div>

    <div class="quote">
        掌握火球术的那一刻起，法师第一次真正拥有了毁灭与自我毁灭的能力。——卡西米尔·斯通
    </div>

    <div class="source-placeholder">{{source}}</div>
    <div style="clear:both;"></div>
</div>

</body>
</html>
